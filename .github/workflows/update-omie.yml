name: Update OMIE prices

on:
workflow_dispatch:
schedule:
- cron: "30 12 * * *"
- cron: "0 18 * * *"

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.11"
- run: pip install requests
- run: python update_prices.py
- run: git config user.name "github-actions"
- run: git config user.email "[actions@github.com](mailto:actions@github.com)"
- run: git add docs/latest.json docs/precios/*.json
- run: git commit -m "update prices" || echo "no changes"
- run: git push
