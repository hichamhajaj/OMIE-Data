name: Update OMIE prices

on:
schedule:
- cron: '0 14 * * *'
workflow_dispatch:

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Run script
    run: python update_prices.py

  - name: Commit files
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add .
      git commit -m "update prices" || echo "no changes"
      git push
```
